name: AI PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      contains(github.event.comment.body, '@askserge') &&
      (github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number || github.event.pull_request.number }}/head
          continue-on-error: true
      - uses: huggingface/serge@main
        with:
          llm_api_base: ${{ vars.LLM_API_BASE || 'https://openrouter.ai/api/v1' }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}
          llm_model: ${{ vars.LLM_MODEL }}
          llm_max_tokens: '8192'
